name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend:
    name: Backend Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: geoflux
          POSTGRES_PASSWORD: geoflux
          POSTGRES_DB: geoflux
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geoflux -d geoflux"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://geoflux:geoflux@localhost:5432/geoflux?schema=public
      JWT_SECRET: ci-runtime-secret
      PORT: 4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Apply Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Build + runtime smoke gate
        working-directory: backend
        run: npm run gate:runtime

  frontend:
    name: Frontend Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.geoflux.com # Example for CI build check

