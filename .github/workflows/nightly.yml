name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

jobs:
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: geoflux
          POSTGRES_PASSWORD: geoflux
          POSTGRES_DB: geoflux
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geoflux -d geoflux"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://geoflux:geoflux@localhost:5432/geoflux?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-load-test-secret
      PORT: 4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          node dist/src/index.js &
          sleep 3
          curl -sSf http://localhost:4000/health || exit 1

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: scripts/load-test.js
          flags: --env API_URL=http://localhost:4000

      - name: Upload k6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: |
            summary.json
            *.json
